name: Build Go Binaries

on:
  push:
    tags:
      - 'go-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/v6tunnel-server-cli-${{ matrix.suffix }} ./cmd/server
          go build -ldflags="-s -w" -o dist/v6tunnel-client-cli-${{ matrix.suffix }} ./cmd/client
          go build -ldflags="-s -w" -o dist/v6tunnel-server-gui-${{ matrix.suffix }} ./cmd/server-gui
          go build -ldflags="-s -w" -o dist/v6tunnel-client-gui-${{ matrix.suffix }} ./cmd/client-gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v6tunnel-go-${{ matrix.suffix }}
          path: dist/*