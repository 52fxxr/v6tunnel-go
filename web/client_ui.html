<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v6tunnel 客户端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#f0f6fc}
.header .status{display:flex;align-items:center;gap:8px;font-size:14px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot.green{background:#3fb950}
.dot.red{background:#f85149}
.dot.yellow{background:#d29922}
.container{padding:16px 24px;max-width:800px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:15px;color:#f0f6fc;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #30363d}
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.form-row label{font-size:13px;color:#8b949e;min-width:70px}
.form-row input{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#c9d1d9;font-size:13px;flex:1;min-width:80px}
.form-row input:focus{outline:none;border-color:#58a6ff}
.btn{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 14px;color:#c9d1d9;font-size:13px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#30363d}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-danger{background:#da3633;border-color:#f85149;color:#fff}
.btn-danger:hover{background:#f85149}
.btn-sm{padding:4px 10px;font-size:12px}
.mapping-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;flex-wrap:wrap}
.mapping-row input{flex:1;min-width:50px}
.log-panel{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;height:200px;overflow-y:auto;font-family:"Cascadia Code","Fira Code",monospace;font-size:12px;line-height:1.6}
.log-panel div{padding:1px 4px}
.log-panel .info{color:#58a6ff}
.log-panel .warn{color:#d29922}
.log-panel .error{color:#f85149}
.log-panel .ok{color:#3fb950}
.status-bar{display:flex;align-items:center;gap:16px;font-size:13px;color:#8b949e;padding:8px 0}
.status-bar span{color:#c9d1d9}
@media(max-width:768px){.container{padding:8px}}
</style>
</head>
<body>
<div class="header">
  <h1>🔌 v6tunnel 客户端</h1>
  <div class="status">
    <span id="statusDot" class="dot red"></span>
    <span id="statusText">未连接</span>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>⚙️ 连接配置</h2>
    <div class="form-row">
      <label>服务器地址</label>
      <input type="text" id="serverAddr" placeholder="2400:xxxx::1:7000" value="[2400::1]:7000">
    </div>
    <div class="form-row">
      <label>共享密钥</label>
      <input type="text" id="secret" placeholder="输入密钥">
    </div>
    <div class="form-row">
      <label>自动重连</label>
      <input type="checkbox" id="autoReconnect" checked style="flex:0;width:18px;height:18px">
    </div>
    <div class="form-row">
      <button class="btn btn-primary" id="btnConnect" onclick="doConnect()">▶ 连接</button>
      <button class="btn btn-danger" id="btnDisconnect" onclick="doDisconnect()" disabled>■ 断开</button>
    </div>
  </div>

  <div class="card">
    <h2>📡 端口映射</h2>
    <div id="portMappings"></div>
    <div class="form-row" style="margin-top:8px">
      <input type="number" id="newRport" placeholder="远端端口" style="flex:1" value="7001">
      <input type="text" id="newHost" placeholder="127.0.0.1" style="flex:1" value="127.0.0.1">
      <input type="number" id="newLport" placeholder="本地端口" style="flex:1" value="25565">
      <button class="btn" onclick="addPort()">+ 添加</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 运行日志</h2>
    <div class="status-bar">
      <span id="streamCount">流: 0</span>
      <span id="trafficInfo">↓ 0B ↑ 0B</span>
    </div>
    <div class="log-panel" id="logPanel"></div>
  </div>
</div>

<script>
const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
var ws = null;
var connected = false;
var ports = [{remote:7001, host:'127.0.0.1', local:25565}];

function connectWS() {
  if (ws) try { ws.close(); } catch(e) {}
  ws = new WebSocket(wsProto + '//' + location.host + '/ws');
  ws.onmessage = function(e) {
    var data = JSON.parse(e.data);
    switch(data.type) {
      case 'status': updateStatus(data); break;
      case 'log': addLog(data.level, data.msg); break;
    }
  };
  ws.onclose = function() { setTimeout(connectWS, 2000); };
  ws.onerror = function() {};
}

function updateStatus(data) {
  connected = data.connected;
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusText');
  dot.className = 'dot ' + (connected ? 'green' : 'red');
  txt.textContent = connected ? '已连接' : (data.error || '未连接');
  document.getElementById('btnConnect').disabled = connected;
  document.getElementById('btnDisconnect').disabled = !connected;
  if (data.streams !== undefined) {
    document.getElementById('streamCount').textContent = '流: ' + data.streams;
  }
  if (data.rx !== undefined) {
    document.getElementById('trafficInfo').textContent = '↓ ' + fmtBytes(data.rx) + ' ↑ ' + fmtBytes(data.tx);
  }
}

function addLog(level, msg) {
  var el = document.getElementById('logPanel');
  var d = document.createElement('div');
  d.className = level;
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function fmtBytes(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b/1024).toFixed(1) + 'KB';
  return (b/1048576).toFixed(1) + 'MB';
}

function refreshPortUI() {
  var el = document.getElementById('portMappings');
  if (ports.length === 0) {
    el.innerHTML = '<div style="color:#8b949e;text-align:center;padding:10px">未配置端口映射</div>';
    return;
  }
  var h = '';
  for (var i = 0; i < ports.length; i++) {
    var p = ports[i];
    h += '<div class="mapping-row">' +
         '<span style="font-family:monospace;font-size:13px">:' + p.remote + ' → ' +
         p.host + ':' + p.local + '</span>' +
         '<button class="btn btn-sm btn-danger" onclick="removePort(' + i + ')">✕</button>' +
         '</div>';
  }
  el.innerHTML = h;
}

function addPort() {
  var rp = parseInt(document.getElementById('newRport').value);
  var host = document.getElementById('newHost').value.trim() || '127.0.0.1';
  var lp = parseInt(document.getElementById('newLport').value);
  if (!rp || !lp) return;
  ports.push({remote: rp, host: host, local: lp});
  refreshPortUI();
  if (connected) {
    fetch('/api/ports', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ports: ports})
    });
  }
}

function removePort(idx) {
  ports.splice(idx, 1);
  refreshPortUI();
  if (connected) {
    fetch('/api/ports', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ports: ports})
    });
  }
}

function doConnect() {
  var addr = document.getElementById('serverAddr').value.trim();
  var secret = document.getElementById('secret').value.trim();
  var autoreconn = document.getElementById('autoReconnect').checked;
  if (!addr || !secret) { addLog('warn', '请填写服务器地址和密钥'); return; }
  if (ports.length === 0) { addLog('warn', '请至少添加一个端口映射'); return; }
  fetch('/api/connect', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({server: addr, secret: secret, ports: ports, auto_reconnect: autoreconn})
  }).then(r => r.json()).then(d => {
    if (d.error) addLog('error', d.error);
    else addLog('ok', '正在连接...');
  });
}

function doDisconnect() {
  fetch('/api/disconnect', {method:'POST'}).then(r => r.json()).then(d => {
    addLog('warn', '已断开连接');
  });
}

refreshPortUI();
connectWS();
</script>
</body>
</html>
